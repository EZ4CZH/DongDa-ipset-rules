name: Auto Update DongDa IPs

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Extract All Data Sources
        run: |
          echo "下载 APNIC 官方数据..."
          curl -sL "http://ftp.apnic.net/apnic/stats/apnic/delegated-apnic-latest" > apnic_raw.txt

          echo "下载第三方补充规则库..."
          curl -sL "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt" > raw_lists.txt
          curl -sL "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt" >> raw_lists.txt
          curl -sL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list" >> raw_lists.txt
          curl -sL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaIPs/ChinaIPs.list" >> raw_lists.txt
          curl -sL "https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute.txt" >> raw_lists.txt
          curl -sL "https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute_v6.txt" >> raw_lists.txt
          curl -sL "https://ispip.clang.cn/all_cn_ipv46.txt" >> raw_lists.txt

          echo "使用正则提取干净的 CIDR IP段..."
          grep -oE '[0-9]{1,3}(\.[0-9]{1,3}){3}/[0-9]{1,2}' raw_lists.txt > extracted_v4.txt || true
          grep -iEo '[a-f0-9:]+/[0-9]{1,3}' raw_lists.txt | grep ":" > extracted_v6.txt || true

      - name: Compile and Run C Engine
        run: |
          echo "编译 C 语言数据整合引擎..."
          gcc -O3 -o process_ips src/process_ips.c -lm
          
          echo "确保 rules 目录存在..."
          mkdir -p rules
          
          echo "执行数据合并、排序与去重..."
          ./process_ips
          
          echo "清理临时文件..."
          rm -f apnic_raw.txt raw_lists.txt extracted_v4.txt extracted_v6.txt process_ips

      - name: Overwrite README and Commit
        run: |
          echo "计算最新的规则数和文件大小..."
          
          V4_LINES=$(wc -l < rules/ipv4.txt)
          V4_COUNT=$((V4_LINES - 2))
          V4_SIZE=$(du -k rules/ipv4.txt | cut -f1)
          
          V6_LINES=$(wc -l < rules/ipv6.txt)
          V6_COUNT=$((V6_LINES - 2))
          V6_SIZE=$(du -k rules/ipv6.txt | cut -f1)
          
          echo "直接覆写生成极简版 README.md..."
          cat <<EOF > README.md
          ## 📦 纯文本规则 (TXT)
          
          | 规则名称 | 规则数 | 文件大小 | TXT文件 |
          | :--- | :--- | :--- | :--- |
          | \`cnipv4\` | **${V4_COUNT}** | ${V4_SIZE}K | [下载 txt](rules/ipv4.txt) |
          | \`cnipv6\` | **${V6_COUNT}** | ${V6_SIZE}K | [下载 txt](rules/ipv6.txt) |
          EOF
          
          echo "配置 Git 机器人并提交..."
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add rules/ipv4.txt rules/ipv6.txt README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: Auto-update IPs and README"
            git push
          else
            echo "当前规则已是最新，无文件变更，跳过提交。"
          fi
